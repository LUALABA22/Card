<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body{margin: 0; box-sizing: border-box; display: flex; justify-content: center; align-items: center; flex-direction: column; background-color: hsl(47, 88%, 63%); min-height: 100vh; padding: 2rem;}
    .card{display: flex; justify-content: center; align-items: center; flex-direction: column; width: 100%; max-width: 335px; background-color: hsl(0, 0%, 100%); padding: 1.5rem 1.5rem 0.75rem; border-radius: 1.25rem; margin-bottom: 3rem; box-shadow: 8px 8px 0px black;}
    .card span{ width: 100%; margin-bottom: 2rem; }
    img{border-radius: 0.75rem;}
    .learning{  background-color: hsl(47, 88%, 63%); padding: 0.5rem; border-radius: 0.25rem; margin-bottom: 1rem; width: 80px; display: inline-block;font-weight: 900;}
    a{cursor: pointer; transition: color 0.3s ease; text-decoration: none; color: #111;}
    a:hover, a:focus-visible{color: #f4d04e; outline: none;}
    .hour{color: hsl(0, 0%, 7%); font-weight: 500;}
    .auteur{display: flex; align-items: center; gap: 1rem;}
    .auteur img{ max-width: 30px; margin-bottom: 0;}
    .auteur{font-weight: 800; font-size: 14px;}
    p{font-size: 1rem; color: hsl(0, 0%, 42%); line-height: 1.5; margin-bottom: 1.5rem;}
</style>
</head>
<body>

  
  

  


  
  <div class="card">
    <span><img src="assets/images/illustration-article.svg" alt="illustration-article"></span>
    
    <div class="card-body">
      <div class="learning">Learning</div>
      <div class="hour">Published 21 Dec 2023</div>
      <h2> <a href="#">HTML & CSS foundations</a></h2>
      <p>  These languages are the backbone of every website, defining structure, content, and presentation.</p>
      <div class="auteur"><img src="assets/images/image-avatar.webp" alt=""> <h5>Greg Hooper</h5></div>
    </div>
  </div>
  
  <!--
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Lualaba22</a>.
  </div>
-->
</body>
</html>
